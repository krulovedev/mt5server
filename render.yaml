services:
  - type: web
    name: mt5-monitor
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python server.py"
    envVars:
      - key: SECRET_KEY
        value: mysecretkey          # ⚠️ เปลี่ยนเป็นรหัสที่ปลอดภัยใน Render Dashboard!
      - key: DATABASE_URL
        value: ""                   # ← วาง Supabase Connection String ที่นี่
                                    #   postgresql://postgres:[PASSWORD]@db.[REF].supabase.co:5432/postgres
